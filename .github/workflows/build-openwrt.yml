#=================================================
# Description: Build OpenWrt using GitHub Actions
# Author: trainSu
#=================================================

name: 编译 OpenWrt 固件

on:
  repository_dispatch:
    types: [Source Code Update]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检查清理前的磁盘空间
        run: |
          echo "检查清理前的磁盘空间"
          df -hT

      - name: 极限清理磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false
          
      - name: 手动创建 Swap 虚拟内存
        run: |
          sudo swapoff /swapfile || true
          sudo rm -f /swapfile
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh | sudo -E bash
          sudo timedatectl set-timezone "$TZ"

      - name: 克隆 OpenWrt 源代码
        run: git clone --depth=20 $REPO_URL -b $REPO_BRANCH openwrt

      - name: 加载自定义 feeds 配置 (diy-part1.sh)
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 更新并安装 feeds
        working-directory: ./openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载自定义配置 (diy-part2.sh)
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 开启 C/C++ 编译器缓存 (ccache)
        uses: actions/cache@v4
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-openwrt-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-openwrt-ccache-

      - name: 缓存下载的 dl 文件夹
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      - name: 下载编译所需的软件包
        run: |
          cd openwrt
          make defconfig
          make download -j16 || make download -j1 V=s

      - name: 编译 OpenWrt 固件
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          ./staging_dir/host/bin/ccache -s || true
          make -j$(nproc) || make -j1 V=s
          ./staging_dir/host/bin/ccache -s || true
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: 整理编译输出的固件文件
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          KERNEL_VER=$(cat *.manifest | grep "^kernel" | head -n 1 | cut -d- -f2 | tr -d ' ')
          echo "KERNEL_VER=$KERNEL_VER" >> $GITHUB_ENV
          shopt -s extglob
          rm -rf !(config.buildinfo|*.manifest|*squashfs-combined.img.gz|*squashfs-combined-efi.img.gz)
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: 发布固件到 Releases
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: 清理旧的 Workflow 运行记录
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          runs=$(gh run list --limit 100 --json databaseId -q '.[].databaseId' | tail -n +4)
          for run in $runs; do
            if [ -n "$run" ]; then
              gh run delete "$run" || true
            fi
          done
