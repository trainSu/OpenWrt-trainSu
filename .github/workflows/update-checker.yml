name: 更新检查器

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master

on:
  workflow_dispatch:
  schedule:
    - cron: 0 16 * * *

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: 获取最新 Commit Hash
      id: getHash
      run: |
        commitHash=$(git ls-remote $REPO_URL $REPO_BRANCH | awk '{print $1}')
        echo "commitHash=$commitHash" >> $GITHUB_OUTPUT

    - name: 对比 Commit Hash
      id: cacheHash
      uses: actions/cache@v4
      with:
        path: .commitHash
        key: HEAD-${{ steps.getHash.outputs.commitHash }}

    - name: 保存新 Commit Hash
      if: steps.cacheHash.outputs.cache-hit != 'true'
      run: |
        echo ${{ steps.getHash.outputs.commitHash }} | tee .commitHash

    - name: 触发编译工作流
      if: steps.cacheHash.outputs.cache-hit != 'true'
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.ACTIONS_TRIGGER_PAT }}
        event-type: Source Code Update

    - name: 清理旧的 Workflow 运行记录
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "开始清理旧的更新检查记录..."
        runs=$(gh run list -R ${{ github.repository }} --limit 100 --json databaseId -q '.[].databaseId' | tail -n +3)
        for run in $runs; do
          gh run delete "$run" -R ${{ github.repository }} || true
        done
